- type: entity
  parent: Dresser
  id: N14Dresser
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Furniture/np13_misc.rsi
    state: dresser

- type: entity
  parent: BaseStructure
  id: N14GrandfatherClock
  name: grandfather clock
  description: An old pre-war clock. Looks grand.
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Furniture/np13_misc.rsi
    state: grand_clock

# Televisions
- type: entity
  parent: BaseStructure
  id: N14Television
  name: television
  description: An old nonfunctional television.
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Furniture/televisions.rsi
    state: wood_tv

- type: entity
  parent: SeatBase
  id: N14Toilet
  name: toilet
  description: Waste not, want not
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Decoration/world.rsi
    state: toilet
  - type: Clickable
  - type: InteractionOutline
  - type: Anchorable
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 80
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 40
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
  - type: AmbientSound
    enabled: false
    volume: -8
    range: 8
    sound:
      path: /Audio/Ambience/Objects/drain.ogg
  - type: ContainerContainer
    containers:
      stash: !type:ContainerSlot {}
  - type: SolutionContainerManager
    solutions:
      drainBuffer:
        maxVol: 500
      toilet:
        maxVol: 250
  - type: Drain
    autoDrain: false
  - type: DumpableSolution
    solution: drainBuffer

